services:
  # Backend API
  - type: web
    name: sangabriel-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: MONGODB_URI
        fromValue:
          type: env
          key: MONGODB_URI
      - key: JWT_SECRET
        fromValue:
          type: env
          key: JWT_SECRET
      - key: FRONTEND_URL
        fromValue:
          type: env
          key: FRONTEND_URL
      - key: SENDGRID_API_KEY
        fromValue:
          type: env
          key: SENDGRID_API_KEY

  # Frontend Next.js
  - type: web
    name: sangabriel-portal
    env: node
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromValue:
          type: env
          key: NEXT_PUBLIC_API_URL
      - key: NODE_ENV
        value: production
